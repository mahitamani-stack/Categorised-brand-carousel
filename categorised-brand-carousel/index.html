<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Clientele</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,300;0,400;0,700;1,300;1,400;1,700&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #0A0A0A;
        --text: #FFFFFF;
        --muted: rgba(255,255,255,0.30);
        --hover: rgba(255,255,255,0.55);
        --divider: rgba(255,255,255,0.07);
        --card-bg: #F0F0F0;
        --font-display: 'Roboto', system-ui, sans-serif;
        --font-mono: 'Space Mono', monospace;
      }
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html, body { width: 100%; height: 100%; }
      body {
  font-family: var(--font-display);
  background: var(--bg);
  color: var(--text);
  display: flex;
  align-items: flex-start;
  justify-content: center;
}
      #root {
        width: 100%;
        height: 50vh;
        min-height: 320px;
      }
      ::-webkit-scrollbar { width: 3px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.10); border-radius: 2px; }
      @keyframes fadeRight {
        from { opacity: 0; transform: translateX(14px); }
        to   { opacity: 1; transform: translateX(0); }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
